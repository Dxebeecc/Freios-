<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma de Procedimentos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen" x-data="appPlataforma">

    <div x-show="ecra === 'home'" x-cloak class="min-h-screen flex flex-col items-center">
        <div class="w-full max-w-md bg-white min-h-screen shadow-2xl flex flex-col">
            <div class="bg-blue-900 p-8 text-white text-center rounded-b-3xl shadow-lg">
                <h1 class="text-3xl font-extrabold tracking-tight">Plataforma Setup</h1>
                <p class="text-blue-200 mt-1 font-medium">Gestão de Procedimentos</p>
            </div>

            <div class="flex-1 p-6 flex flex-col justify-center space-y-6">
                <button @click="iniciarCriacao()" class="bg-white border-2 border-dashed border-blue-400 p-6 rounded-3xl text-left hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center justify-between group">
                    <div>
                        <h3 class="text-xl font-black text-blue-900">Modo Criador</h3>
                        <p class="text-sm font-medium text-gray-500 mt-1">Construir um novo passo a passo</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    </div>
                </button>

                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-300"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-sm font-bold">OU</span>
                    <div class="flex-grow border-t border-gray-300"></div>
                </div>

                <label class="bg-white border-2 border-gray-200 p-6 rounded-3xl text-left hover:border-green-500 hover:shadow-md transition-all flex items-center justify-between cursor-pointer group">
                    <div>
                        <h3 class="text-xl font-black text-green-700">Modo Executor</h3>
                        <p class="text-sm font-medium text-gray-500 mt-1">Carregar ficheiro JSON existente</p>
                        <input type="file" accept=".json" class="hidden" @change="carregarProcedimento($event)">
                    </div>
                    <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center text-green-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    </div>
                </label>
            </div>
        </div>
    </div>

    <div x-show="ecra === 'criador'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl pb-32">
        <div class="bg-slate-800 text-white p-4 pt-6 shadow-md sticky top-0 z-20 flex justify-between items-center">
            <button @click="ecra = 'home'" class="p-2 bg-slate-700 rounded-full hover:bg-slate-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <h1 class="font-black text-lg tracking-wide">Construir Procedimento</h1>
            <div class="w-10"></div>
        </div>

        <div class="p-5 space-y-6">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm space-y-3">
                <label class="block text-xs font-bold text-gray-500 uppercase">Nome do Procedimento</label>
                <input type="text" x-model="proc.titulo" placeholder="Ex: Teste de Molas" class="w-full border-b-2 border-gray-300 focus:border-blue-500 py-2 text-lg font-bold outline-none text-slate-800">
            </div>

            <template x-for="(etapa, indexEtapa) in proc.etapas" :key="indexEtapa">
                <div class="bg-white p-4 rounded-xl border-2 border-blue-100 shadow-sm space-y-4 relative">
                    <button @click="removerEtapa(indexEtapa)" class="absolute top-3 right-3 text-red-400 hover:text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>

                    <label class="block text-xs font-bold text-blue-600 uppercase">Nome da Etapa <span x-text="indexEtapa + 1"></span></label>
                    <input type="text" x-model="etapa.nome" placeholder="Ex: Preparação" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm font-bold focus:outline-none focus:border-blue-400">

                    <div class="space-y-3 mt-4 border-t border-gray-100 pt-3">
                        <template x-for="(check, indexCheck) in etapa.checks" :key="indexCheck">
                            <div class="bg-slate-50 p-3 rounded-lg border border-gray-200 relative">
                                <button @click="removerCheck(indexEtapa, indexCheck)" class="absolute top-2 right-2 text-gray-400 hover:text-red-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
                                </button>
                                
                                <div class="flex gap-2 mb-2">
                                    <select x-model="check.tipo" class="text-xs font-bold bg-white border border-gray-300 rounded p-1">
                                        <option value="normal">☑️ Check Normal</option>
                                        <option value="info">ℹ️ Dica (Azul)</option>
                                        <option value="alert">⚠️ Alerta (Vermelho)</option>
                                    </select>
                                </div>
                                <textarea x-model="check.texto" placeholder="Digite a instrução da tarefa..." class="w-full text-sm p-2 border border-gray-300 rounded focus:outline-none focus:border-blue-400 resize-none" rows="2"></textarea>
                            </div>
                        </template>
                        
                        <button @click="adicionarCheck(indexEtapa)" class="w-full py-2 bg-blue-50 text-blue-700 rounded-lg text-xs font-bold border border-blue-200 hover:bg-blue-100 flex items-center justify-center gap-1">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Adicionar Check
                        </button>
                    </div>
                </div>
            </template>

            <button @click="adicionarEtapa()" class="w-full py-4 bg-gray-200 text-gray-700 border-2 border-dashed border-gray-400 rounded-xl font-bold hover:bg-gray-300 transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Adicionar Nova Etapa
            </button>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-2xl z-20">
            <div class="max-w-md mx-auto flex gap-3">
                <button @click="exportarJSON()" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Salvar / Exportar Procedimento
                </button>
            </div>
        </div>
    </div>

    <div x-show="ecra === 'executor'" x-cloak class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50 relative shadow-2xl pb-32">
        <div class="bg-blue-900 text-white p-4 pt-6 shadow-md sticky top-0 z-20">
            <div class="flex items-center justify-between mb-4">
                <button @click="ecra = 'home'" class="p-2 bg-blue-800 rounded-full hover:bg-blue-700 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1 class="font-black text-xl tracking-wide uppercase" x-text="procCarregado.titulo"></h1>
                <div class="w-10"></div>
            </div>
            <div class="text-center text-sm font-bold text-blue-200 uppercase tracking-widest bg-blue-800 py-1.5 rounded-lg" 
                 x-text="procCarregado.etapas[etapaAtual]?.nome"></div>
        </div>

        <div class="flex-1 p-4 space-y-4">
            <template x-for="(check, index) in procCarregado.etapas[etapaAtual]?.checks" :key="index">
                <div @click="toggleCheck(index)" 
                     :class="checksMarcados[etapaAtual + '-' + index] ? 'bg-green-50 border-green-500 opacity-80' : 
                            (check.tipo === 'alert' ? 'bg-orange-50 border-orange-300' : 
                            (check.tipo === 'info' ? 'bg-blue-50 border-blue-300' : 'bg-white border-gray-200'))"
                     class="p-4 rounded-xl border-2 flex gap-4 items-start transition-all cursor-pointer shadow-sm">
                    
                    <div :class="checksMarcados[etapaAtual + '-' + index] ? 'bg-green-500 border-green-500' : 'border-gray-300 bg-gray-50'" 
                         class="mt-0.5 flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center border-2 transition-colors">
                        <svg x-show="checksMarcados[etapaAtual + '-' + index]" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m20 6-11 11-5-5"/></svg>
                    </div>

                    <div class="flex-1 pt-0.5">
                        <p :class="checksMarcados[etapaAtual + '-' + index] ? 'text-gray-500 line-through' : 'text-gray-800 font-semibold'" 
                           class="text-sm leading-snug whitespace-pre-line" x-text="check.texto"></p>
                    </div>
                </div>
            </template>
        </div>

        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 pb-6 shadow-2xl z-20">
            <div class="max-w-md mx-auto flex gap-3">
                <button @click="etapaAtual = Math.max(0, etapaAtual - 1)" 
                        :disabled="etapaAtual === 0" 
                        :class="etapaAtual === 0 ? 'bg-gray-100 text-gray-300' : 'bg-gray-200 text-gray-700'" 
                        class="px-5 py-4 rounded-2xl font-bold text-sm transition-colors">
                    Voltar
                </button>
                
                <button x-show="etapaAtual < procCarregado.etapas.length - 1" 
                        @click="etapaAtual = Math.min(procCarregado.etapas.length - 1, etapaAtual + 1)" 
                        :disabled="!etapaConcluida()"
                        :class="etapaConcluida() ? 'bg-blue-900 text-white shadow-lg' : 'bg-blue-100 text-blue-300'" 
                        class="flex-1 py-4 rounded-2xl font-bold text-sm transition-all">
                    Avançar Etapa
                </button>

                <button x-show="etapaAtual === procCarregado.etapas.length - 1" 
                        @click="finalizar()"
                        :disabled="!etapaConcluida()"
                        :class="etapaConcluida() ? 'bg-green-500 text-white shadow-lg' : 'bg-green-100 text-green-300'" 
                        class="flex-1 py-4 rounded-2xl font-bold text-sm transition-all">
                    Finalizar OS
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appPlataforma', () => ({
                ecra: 'home',
                
                // === ESTADO DO CRIADOR ===
                proc: {
                    titulo: '',
                    etapas: []
                },

                iniciarCriacao() {
                    this.proc = { titulo: '', etapas: [{ nome: '', checks: [] }] };
                    this.ecra = 'criador';
                },
                adicionarEtapa() {
                    this.proc.etapas.push({ nome: '', checks: [] });
                },
                removerEtapa(index) {
                    this.proc.etapas.splice(index, 1);
                },
                adicionarCheck(indexEtapa) {
                    this.proc.etapas[indexEtapa].checks.push({ texto: '', tipo: 'normal' });
                },
                removerCheck(indexEtapa, indexCheck) {
                    this.proc.etapas[indexEtapa].checks.splice(indexCheck, 1);
                },
                exportarJSON() {
                    if(!this.proc.titulo) { alert("Dê um nome ao procedimento antes de guardar!"); return; }
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.proc, null, 2));
                    const node = document.createElement('a');
                    node.setAttribute("href", dataStr);
                    node.setAttribute("download", this.proc.titulo.replace(/\s+/g, '_').toLowerCase() + ".json");
                    document.body.appendChild(node);
                    node.click();
                    node.remove();
                    alert("Procedimento descarregado com sucesso!");
                },

                // === ESTADO DO EXECUTOR ===
                procCarregado: { titulo: '', etapas: [] },
                etapaAtual: 0,
                checksMarcados: {}, // Guarda o estado: ex: {'0-1': true} significa Etapa 0, check 1 concluído

                carregarProcedimento(event) {
                    const ficheiro = event.target.files[0];
                    if (!ficheiro) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            this.procCarregado = JSON.parse(e.target.result);
                            this.etapaAtual = 0;
                            this.checksMarcados = {};
                            this.ecra = 'executor';
                        } catch (erro) {
                            alert("Erro ao ler o ficheiro. Certifique-se de que é um ficheiro JSON válido.");
                        }
                    };
                    reader.readAsText(ficheiro);
                    // Reseta o input file para permitir carregar o mesmo arquivo duas vezes seguidas se necessário
                    event.target.value = '';
                },
                toggleCheck(indexCheck) {
                    const chave = this.etapaAtual + '-' + indexCheck;
                    this.checksMarcados[chave] = !this.checksMarcados[chave];
                },
                etapaConcluida() {
                    if(!this.procCarregado.etapas || !this.procCarregado.etapas[this.etapaAtual]) return false;
                    const totalChecks = this.procCarregado.etapas[this.etapaAtual].checks.length;
                    if(totalChecks === 0) return true; // Se a etapa não tiver checks, permite avançar
                    
                    for(let i = 0; i < totalChecks; i++) {
                        if(!this.checksMarcados[this.etapaAtual + '-' + i]) return false;
                    }
                    return true;
                },
                finalizar() {
                    alert("Ordem de Serviço (OS) finalizada com sucesso!");
                    this.ecra = 'home';
                }
            }));
        });
    </script>
</body>
</html>
