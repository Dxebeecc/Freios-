<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arquiteto LATAM - Criador de Procedimento Avançado</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; transition: background-color 0.3s, color 0.3s; }
        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .input-transparent { background: transparent; border: none; outline: none; width: 100%; }
    </style>
</head>
<body class="antialiased min-h-screen" :class="darkMode ? 'bg-[#091030] text-gray-100' : 'bg-[#f8fafc] text-gray-800'" x-data="appPlataforma">

    <button @click="toggleDarkMode()" class="fixed bottom-6 right-6 w-12 h-12 rounded-full shadow-2xl flex items-center justify-center z-50 bg-[#0f1a4a] text-white" :class="darkMode ? 'bg-white text-[#0f1a4a]' : ''">
        <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.07" x2="5.64" y2="17.66"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>

    <!-- HOME -->
    <div x-show="ecra === 'home'" class="min-h-screen flex flex-col items-center">
        <div class="w-full max-w-md min-h-screen shadow-2xl flex flex-col bg-white" :class="darkMode ? 'bg-[#0f1a4a]' : ''">
            <div class="bg-[#0f1a4a] p-8 text-white text-center rounded-b-3xl shadow-lg relative">
                <h1 class="text-2xl font-black">Arquiteto <span class="text-red-500">LATAM</span></h1>
                <p class="text-blue-200 text-xs mt-1">Criador de Procedimento Avançado</p>
                <div class="mt-4 inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] uppercase font-bold bg-white/10">
                    <span :class="isLoadingDb ? 'bg-orange-400 animate-pulse' : 'bg-green-400'" class="w-2 h-2 rounded-full"></span>
                    <span x-text="isLoadingDb ? 'Carregando Acervo...' : 'Acervo Pronto'"></span>
                </div>
            </div>

            <div class="flex-1 p-6 flex flex-col justify-center space-y-5">
                <button @click="iniciarCriacao()" :disabled="isLoadingDb" class="p-5 rounded-3xl text-left border-2 border-dashed bg-white border-[#2a3f8a]" :class="darkMode ? 'bg-[#13225c] border-blue-500/40' : ''">
                    <h3 class="text-lg font-black text-[#0f1a4a]" :class="darkMode ? 'text-white' : ''">1. Criar / Editar</h3>
                    <p class="text-xs text-gray-400">Monte novos procedimentos e passos</p>
                </button>

                <label class="p-5 rounded-3xl text-left border-2 cursor-pointer bg-white border-gray-100" :class="darkMode ? 'bg-[#13225c] border-blue-900/50' : ''">
                    <h3 class="text-lg font-black text-gray-700" :class="darkMode ? 'text-white' : ''">2. Executar OS</h3>
                    <p class="text-xs text-gray-400">Carregue um arquivo .json existente</p>
                    <input type="file" accept=".json" class="hidden" @change="carregarProcedimento($event)">
                </label>

                <button @click="carregarDemo()" :disabled="isLoadingDb" class="w-full p-5 rounded-3xl bg-[#0f1a4a] text-white">
                    <h3 class="text-lg font-black text-white">Modo DEMO</h3>
                    <p class="text-xs text-blue-200">Abra o guia operacional de demonstração</p>
                </button>
            </div>
        </div>
    </div>

    <!-- CRIADOR / EDITOR -->
    <div x-show="ecra === 'criador'" x-cloak class="min-h-screen lg:h-screen w-full lg:flex lg:flex-row lg:overflow-hidden">
        <div class="w-full max-w-md mx-auto relative shadow-2xl flex flex-col min-h-screen lg:h-screen lg:w-1/2 lg:max-w-none lg:mx-0 bg-[#f8fafc] border-r" :class="darkMode ? 'bg-[#091030] border-blue-950' : ''">
            <div class="bg-[#0f1a4a] text-white p-4 pt-6 sticky top-0 z-20 flex-shrink-0">
                <div class="flex items-center justify-between mb-4">
                    <button @click="ecra = 'home'" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg></button>
                    <div class="flex items-center gap-2">
                        <input type="text" x-model="proc.equipamento" placeholder="EQUIPAMENTO" class="input-transparent text-center font-black text-sm uppercase text-white">
                        <input type="text" x-model="proc.processo" placeholder="PROCEDIMENTO" class="input-transparent text-center font-bold text-xs uppercase text-blue-100">
                    </div>
                    <div class="w-10 text-right font-black" x-text="bibliotecaEmCriacao.length"></div>
                </div>
                <input type="text" x-model="proc.ciclo" placeholder="DEFINIR CICLO" class="input-transparent text-center text-[10px] tracking-widest font-bold">
            </div>

            <div class="flex-1 p-5 space-y-6 overflow-y-auto pb-32">
                <template x-for="(etapa, indexEtapa) in proc.etapas" :key="indexEtapa">
                    <div class="space-y-4">
                        <input type="text" x-model="etapa.nome" placeholder="NOME DA ETAPA PRINCIPAL..." class="w-full bg-transparent font-black text-xs border-b border-gray-300 outline-none uppercase py-1" :class="darkMode ? 'text-white border-blue-900' : 'text-[#0f1a4a]'">
                        <template x-for="(modulo, indexModulo) in etapa.modulos" :key="indexModulo">
                            <div class="border rounded-2xl p-4 bg-white shadow-sm border-gray-100" :class="darkMode ? 'bg-[#0f1a4a]/40 border-blue-950' : ''">
                                <input type="text" x-model="modulo.titulo" placeholder="Título da Operação..." class="w-full font-black text-sm uppercase bg-transparent outline-none mb-3" :class="darkMode ? 'text-white' : ''">
                                <template x-for="(check, indexCheck) in modulo.checks" :key="indexCheck">
                                    <div class="border rounded-xl p-3 bg-gray-50 mb-3 space-y-3" :class="getContainerClass(check.tipo, darkMode, false, true)">
                                        <textarea x-model="check.texto" placeholder="Instrução do Passo..." class="w-full bg-transparent text-xs font-bold outline-none resize-none" rows="2"></textarea>
                                        <div class="relative">
                                            <input type="text" x-show="!check.toolCode" placeholder="Vincular Peça (Digite P/N)..." @input="buscarNoAcervo($event.target.value, check)" class="w-full bg-white border rounded-lg px-3 py-1.5 text-[10px] font-bold outline-none uppercase" :class="darkMode ? 'bg-blue-950 text-white border-blue-900' : ''">
                                            <div x-show="check.toolCode" class="bg-[#0f1a4a] text-white rounded-lg px-3 py-1.5 text-[10px] font-mono flex justify-between">
                                                <span x-text="'🛠️ VINCULADO: ' + check.toolCode"></span>
                                                <button @click="desvincularFerramenta(check)" class="text-red-400 font-bold">X</button>
                                            </div>
                                            <div x-show="check._resultados && check._resultados.length > 0" class="absolute left-0 right-0 bg-white border border-gray-200 rounded-lg shadow-xl max-h-32 overflow-y-auto z-30" :class="darkMode ? 'bg-[#0f1a4a] border-blue-900' : ''">
                                                <template x-for="t in check._resultados" :key="t.id">
                                                    <div @click="vincularFerramenta(t, check)" class="p-2 border-b text-[10px] font-bold cursor-pointer hover:bg-red-50" :class="darkMode ? 'hover:bg-blue-950 border-blue-950' : ''">
                                                        <span class="block text-[#0f1a4a]" :class="darkMode ? 'text-white' : ''" x-text="t.code"></span>
                                                        <span class="block text-gray-400 font-normal" x-text="t.name"></span>
                                                    </div>
                                                </template>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                <button @click="adicionarCheck(indexEtapa, indexModulo)" class="text-[10px] font-black text-blue-500 uppercase">+ Adicionar Passo</button>
                            </div>
                        </template>
                        <button @click="adicionarModulo(indexEtapa)" class="w-full py-2 border border-dashed rounded-xl text-[10px] font-black uppercase text-gray-400">+ Nova Operação</button>
                    </div>
                </template>
                <button @click="adicionarEtapa()" class="w-full py-4 border-2 border-dashed bg-white border-gray-200 rounded-2xl font-black text-xs text-red-500 uppercase" :class="darkMode ? 'bg-[#13225c] border-blue-500/30' : ''">+ Adicionar Etapa Principal</button>
            </div>

            <div class="p-4 border-t sticky bottom-0 bg-white" :class="darkMode ? 'bg-[#0f1a4a] border-blue-950' : ''">
                <button @click="exportarJSON()" class="w-full bg-[#e21a22] text-white py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg">Finalizar e Baixar .JSON</button>
            </div>
        </div>

        <!-- Live Preview Lado Direito (Desktop) -->
        <div class="hidden lg:flex flex-1 bg-slate-900/10 h-screen items-center justify-center p-6 border-l" :class="darkMode ? 'bg-black/40 border-blue-950' : ''" x-data="{ simEtapa: 0 }">
            <div class="w-[340px] h-[680px] bg-zinc-900 rounded-[40px] p-3 shadow-2xl border-4 border-zinc-800 relative flex flex-col">
                <div class="w-full h-full rounded-[28px] overflow-hidden flex flex-col bg-gray-100 dark:bg-[#091030] transition-colors">
                    <div class="bg-[#0f1a4a] text-white p-4 text-center">
                        <h1 class="font-black text-xs uppercase tracking-tight" x-text="proc.equipamento || 'AERONAVE'"></h1>
                        <p class="text-[10px] text-blue-200 font-bold uppercase tracking-widest mt-0.5" x-text="proc.processo || 'PROCEDIMENTO'"></p>
                    </div>
                    <div class="flex-1 p-3 overflow-y-auto space-y-3">
                        <template x-for="mod in proc.etapas[simEtapa]?.modulos">
                            <div class="border rounded-xl p-3 bg-white dark:bg-[#0f1a4a]">
                                <h4 class="font-black text-xs uppercase text-[#0f1a4a] dark:text-white" x-text="mod.titulo || 'Nova Operação'"></h4>
                                <div class="space-y-1 mt-2">
                                    <template x-for="ch in mod.checks">
                                        <div class="text-[10px] font-bold p-2 rounded bg-gray-50 border" :class="getContainerClass(ch.tipo, darkMode, false, false)">
                                            <p x-text="ch.texto || 'Passo sem instrução'"></p>
                                            <span x-show="ch.toolCode" class="inline-block bg-blue-100 text-blue-700 text-[8px] px-1.5 py-0.5 rounded mt-1" x-text="'🛠️ ' + ch.toolCode"></span>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SELETOR INICIO -->
    <div x-show="ecra === 'seletor_inicio'" class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-white" :class="darkMode ? 'bg-[#0f1a4a]' : ''">
        <div class="bg-[#0f1a4a] p-6 text-white text-center rounded-b-2xl shadow">
            <h2 class="text-lg font-black">Filtro do Procedimento</h2>
        </div>
        <div class="p-6 flex-1 space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">1. Selecione o Equipamento:</label>
                <div class="grid grid-cols-2 gap-2">
                    <template x-for="equip in equipamentosDisponiveis" :key="equip">
                        <button @click="selecionarEquipamento(equip)" :class="filtros.equipamento === equip ? 'bg-[#0f1a4a] text-white font-bold' : 'bg-gray-100 text-gray-700'" class="py-4 px-2 border rounded-xl font-bold text-xs uppercase" x-text="equip"></button>
                    </template>
                </div>
            </div>
            <div x-show="filtros.equipamento">
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">2. Selecione o Ciclo:</label>
                <div class="grid grid-cols-3 gap-2">
                    <template x-for="ciclo in ciclosDisponiveis" :key="ciclo">
                        <button @click="filtros.ciclo = ciclo" :class="filtros.ciclo === ciclo ? 'bg-red-500 text-white font-bold border-transparent' : 'bg-gray-100 text-gray-400'" class="py-3 px-1 border rounded-xl font-bold text-[10px] uppercase" x-text="ciclo"></button>
                    </template>
                </div>
            </div>
        </div>
        <div class="p-4 bg-gray-50" :class="darkMode ? 'bg-[#0f1a4a]' : ''">
            <button @click="avancarParaFluxo()" :disabled="!filtros.equipamento || !filtros.ciclo" :class="(!filtros.equipamento || !filtros.ciclo) ? 'bg-gray-200 text-gray-400' : 'bg-green-500 text-white shadow-lg'" class="w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest">Avançar para Fluxo</button>
        </div>
    </div>

    <!-- SELETOR FLUXO -->
    <div x-show="ecra === 'seletor_fluxo'" class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50" :class="darkMode ? 'bg-[#091030]' : ''">
        <div class="bg-[#0f1a4a] p-6 text-white text-center rounded-b-3xl">
            <h1 class="text-xl font-black uppercase" x-text="filtros.equipamento"></h1>
            <p class="text-xs text-blue-200 uppercase tracking-widest" x-text="filtros.ciclo"></p>
        </div>
        <div class="p-6 space-y-3 flex-1 overflow-y-auto">
            <template x-for="proc in processosDisponiveis" :key="proc">
                <button @click="iniciarOS(proc)" class="w-full border p-5 bg-white rounded-2xl flex justify-between items-center hover:border-red-500 shadow-sm" :class="darkMode ? 'bg-[#0f1a4a] border-blue-950 text-white' : ''">
                    <h3 class="text-sm font-black uppercase" x-text="proc"></h3>
                    <span class="text-red-500 font-bold">&rarr;</span>
                </button>
            </template>
        </div>
    </div>

    <!-- CHECKLIST -->
    <div x-show="ecra === 'checklist'" class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50" :class="darkMode ? 'bg-[#091030]' : ''">
        <div class="bg-[#0f1a4a] text-white p-4 pt-6 sticky top-0 z-20">
            <div class="flex justify-between items-center mb-4">
                <button @click="ecra = 'seletor_fluxo'" class="text-white font-bold">&larr; Voltar</button>
                <h1 class="font-black text-xs uppercase tracking-wide text-center" x-text="procCarregado?.equipamento + ' • ' + procCarregado?.processo"></h1>
                <div class="w-10"></div>
            </div>
            <div class="flex justify-center gap-2">
                <template x-for="(etapa, index) in procCarregado?.etapas" :key="index">
                    <button @click="etapaAtual = index" :class="etapaAtual === index ? 'bg-red-500 text-white' : 'bg-blue-950 text-blue-300'" class="w-8 h-8 rounded-full font-black text-xs border" x-text="index + 1"></button>
                </template>
            </div>
            <p class="text-center text-[10px] font-black uppercase tracking-wider mt-3" x-text="procCarregado?.etapas[etapaAtual]?.nome"></p>
        </div>

        <div class="flex-1 p-4 space-y-3 overflow-y-auto pb-24">
            <template x-for="(modulo, index) in procCarregado?.etapas[etapaAtual]?.modulos" :key="index">
                <button @click="abrirModulo(modulo, index)" class="w-full p-5 bg-white border border-gray-100 rounded-xl font-bold text-sm uppercase text-left flex justify-between items-center shadow-sm" :class="darkMode ? 'bg-[#0f1a4a] border-blue-950 text-white' : ''">
                    <span x-text="modulo.titulo" :class="isModuloCompleto(index) ? 'text-green-500 line-through' : ''"></span>
                    <span class="text-xs font-normal" x-text="isModuloCompleto(index) ? '✅ OK' : '⚙️ Executar'"></span>
                </button>
            </template>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-4 max-w-md mx-auto bg-white border-t" :class="darkMode ? 'bg-[#0f1a4a] border-blue-950' : ''">
            <button @click="finalizar()" class="w-full py-4 bg-green-500 text-white rounded-xl font-black text-xs uppercase tracking-widest">Finalizar OS</button>
        </div>
    </div>

    <!-- EXECUTOR PASSO OPERAÇÃO -->
    <div x-show="ecra === 'module'" class="min-h-screen flex flex-col w-full max-w-md mx-auto bg-gray-50" :class="darkMode ? 'bg-[#091030]' : ''">
        <div class="p-5 pt-6 bg-white border-b" :class="darkMode ? 'bg-[#0f1a4a] border-blue-950 text-white' : ''">
            <div class="flex items-center gap-4">
                <button @click="ecra = 'checklist'" class="w-10 h-10 bg-gray-100 dark:bg-blue-950 rounded-full flex items-center justify-center font-bold text-lg">&larr;</button>
                <h2 class="text-sm font-black uppercase tracking-tight truncate" x-text="moduloAtivo?.titulo"></h2>
            </div>
        </div>

        <div class="flex-1 p-4 space-y-3 overflow-y-auto">
            <template x-for="(check, indexCheck) in moduloAtivo?.checks" :key="indexCheck">
                <div class="p-4 border rounded-2xl bg-white flex gap-3 shadow-sm transition-all" :class="getContainerClass(check.tipo, darkMode, checksMarcados[etapaAtual + '-' + moduloAtivoIndex + '-' + indexCheck], false)">
                    <div @click="toggleCheck(indexCheck)" class="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 cursor-pointer" :class="checksMarcados[etapaAtual + '-' + moduloAtivoIndex + '-' + indexCheck] ? 'bg-green-500 border-green-500 text-white' : 'bg-white border-gray-300'">
                        <svg x-show="checksMarcados[etapaAtual + '-' + moduloAtivoIndex + '-' + indexCheck]" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><path d="m20 6-11 11-5-5"/></svg>
                    </div>
                    <div class="flex-1 pt-0.5">
                        <p class="text-xs leading-snug font-bold" :class="getTextClass(check.tipo, darkMode, checksMarcados[etapaAtual + '-' + moduloAtivoIndex + '-' + indexCheck])"><span x-text="getPrefix(check.tipo)"></span><span x-text="check.texto"></span></p>
                        <span x-show="check.toolCode" class="inline-block bg-blue-50 text-[#0f1a4a] font-mono text-[9px] font-black px-2 py-0.5 border rounded border-blue-100 mt-2" x-text="'⚙️ Ferramenta: ' + check.toolCode"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('appPlataforma', () => ({
                ecra: 'home',
                isLoadingDb: true,
                toolsList: [],
                darkMode: false,
                currentSheetId: '1TPbRPBZL8GXYt3SXS6hSlVu8GyoU0ZE4yEuofpU_m4E',

                async init() {
                    this.darkMode = localStorage.getItem('darkMode') === 'true';

                    // Roteamento inteligente por ID da URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const sheetIdParam = urlParams.get('id');
                    let csvUrl = '';

                    if (!sheetIdParam) {
                        // Se não passar nada na URL, usa a planilha padrão de Rodas e Freios
                        csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRHBw7M7f58VdQOb22lLEl6759ApiWB0fFHdqU1I8p45seWfxR7C-_X5tBGmTw4-ErnJaurfch2v3Bw/pub?gid=1418929880&single=true&output=csv';
                    } else {
                        // Se passar o ID, puxa dinamicamente a primeira aba em formato CSV limpo
                        this.currentSheetId = sheetIdParam.trim();
                        csvUrl = `https://docs.google.com/spreadsheets/d/${this.currentSheetId}/export?format=csv`;
                    }

                    try {
                        const response = await fetch(csvUrl);
                        if (!response.ok) throw new Error();
                        const csvText = await response.text();
                        const linhas = csvText.split(/\r?\n/);
                        const regexCSV = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                        
                        for (let i = 1; i < linhas.length; i++) {
                            if (!linhas[i].trim()) continue;
                            const colunas = linhas[i].split(regexCSV).map(c => c.replace(/^"|"$/g, '').trim());
                            this.toolsList.push({ 
                                id: i, 
                                name: colunas[0] || 'N/A', 
                                code: colunas[1] || 'N/A', 
                                loc: colunas[3] || 'Sem Móvel', 
                                sub: colunas[4] || 'Sem Divisão', 
                                image: colunas[5] || '',
                                tutorial: colunas[8] || '' 
                            });
                        }
                    } catch (e) { 
                        console.error("Falha ao sincronizar o acervo remoto via ID."); 
                    } finally { this.isLoadingDb = false; }
                },

                toggleDarkMode() { this.darkMode = !this.darkMode; localStorage.setItem('darkMode', this.darkMode); },
                getContainerClass(t, d, m, c) {
                    if (m) return d ? 'bg-green-950/10 border-green-600 opacity-50' : 'bg-green-50/50 border-green-500 opacity-75';
                    if (t === 'warning') return d ? 'bg-red-950/20 border-red-900/50' : 'bg-red-50/50 border-red-200';
                    if (t === 'caution') return d ? 'bg-orange-950/20 border-orange-900/50' : 'bg-orange-50/50 border-orange-200';
                    if (c) return d ? 'bg-[#13225c]/30 border-blue-950' : 'bg-[#f8fafc] border-gray-100';
                    return d ? 'bg-[#0f1a4a] border-blue-950' : 'bg-white border-gray-200';
                },
                getTextClass(t, d, m) {
                    if (m) return 'text-green-600 font-medium line-through';
                    if (t === 'warning') return d ? 'text-red-400 font-bold' : 'text-red-700 font-bold';
                    if (t === 'caution') return d ? 'text-orange-400 font-bold' : 'text-orange-700 font-bold';
                    return d ? 'text-gray-100' : 'text-gray-800';
                },
                getPrefix(t) { return (t==='warning')?'WARNING: ':(t==='caution')?'CAUTION: ':(t==='dica_tecnica')?'DICA TÉCNICA: ':(t==='dica_operacional')?'DICA OPERACIONAL: ' : ''; },

                bibliotecaEmCriacao: [], isEditingIndex: null, proc: { equipamento: '', ciclo: '', processo: '', etapas: [] },
                iniciarCriacao() { this.proc = { equipamento: '', ciclo: '', processo: '', etapas: [{ nome: '', modulos: [{ titulo: '', checks: [] }] }] }; this.ecra = 'criador'; },
                importarParaEdicao(ev) {
                    const f = ev.target.files[0]; if (!f) return;
                    const r = new FileReader(); r.onload = (e) => { this.bibliotecaEmCriacao = JSON.parse(e.target.result); this.iniciarCriacao(); }; r.readAsText(f);
                },
                carregarItemParaEdicao(i) { this.proc = JSON.parse(JSON.stringify(this.bibliotecaEmCriacao[i])); this.isEditingIndex = i; },
                adicionarEtapa() { this.proc.etapas.push({ nome: '', modulos: [] }); },
                removerEtapa(i) { this.proc.etapas.splice(i,1); },
                adicionarModulo(i) { this.proc.etapas[i].modulos.push({ titulo: '', checks: [] }); },
                adicionarCheck(i, m) { this.proc.etapas[i].modulos[m].checks.push({ texto: '', tipo: 'normal', toolCode: '', _resultados: [] }); },
                buscarNoAcervo(q, chk) { if (!q.trim()) { chk._resultados = []; return; } chk._resultados = this.toolsList.filter(t => t.code.toLowerCase().includes(q.toLowerCase()) || t.name.toLowerCase().includes(q.toLowerCase())).slice(0,5); },
                vincularFerramenta(t, chk) { chk.toolCode = t.code; chk._resultados = []; },
                desvincularFerramenta(chk) { chk.toolCode = ''; },
                exportarJSON() {
                    const node = document.createElement('a');
                    node.setAttribute("href", "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify([this.proc], null, 2)));
                    node.setAttribute("download", `Arquiteto_Procedimento_${Date.now()}.json`); document.body.appendChild(node); node.click(); node.remove();
                },

                bibliotecaCarregada: [], filtros: { equipamento: '', ciclo: '', processo: '' }, procCarregado: null, etapaAtual: 0, moduloAtivo: null, moduloAtivoIndex: 0, checksMarcados: {}, modalData: {}, modalOpen: false,
                async carregarDemo() {
                    this.isLoadingDb = true;
                    try {
                        const res = await fetch('https://gist.githubusercontent.com/Dxebeecc/4cbf7e2c802d2da51ea7334673c6b8c8/raw/6f9905540bad1692fa5dae3c43891a0d56d4d2a8/demo_latam.json');
                        this.bibliotecaCarregada = await res.json(); this.ecra = 'seletor_inicio';
                    } catch (e) { alert("Erro ao carregar Demo."); } finally { this.isLoadingDb = false; }
                },
                carregarProcedimento(ev) {
                    const f = ev.target.files[0]; if(!f) return;
                    const r = new FileReader(); r.onload = (e) => { this.bibliotecaCarregada = JSON.parse(e.target.result); this.ecra = 'seletor_inicio'; }; r.readAsText(f);
                },
                get equipamentosDisponiveis() { return [...new Set(this.bibliotecaCarregada.map(p => p.equipamento))].filter(Boolean); },
                get ciclosDisponiveis() { return [...new Set(this.bibliotecaCarregada.filter(p => p.equipamento === this.filtros.equipamento).map(p => p.ciclo))].filter(Boolean); },
                get processosDisponiveis() { return [...new Set(this.bibliotecaCarregada.filter(p => p.equipamento === this.filtros.equipamento && p.ciclo === this.filtros.ciclo).map(p => p.processo))].filter(Boolean); },
                selecionarEquipamento(e) { this.filtros.equipamento = e; this.filtros.ciclo = ''; },
                avancarParaFluxo() { this.ecra = 'seletor_fluxo'; },
                iniciarOS(p) { this.procCarregado = this.bibliotecaCarregada.find(o => o.processo === p); this.etapaAtual = 0; this.checksMarcados = {}; this.ecra = 'checklist'; },
                abrirModulo(m, i) { this.moduloAtivo = m; this.moduloAtivoIndex = i; this.ecra = 'module'; },
                toggleCheck(i) { const k = this.etapaAtual+'-'+this.moduloAtivoIndex+'-'+i; this.checksMarcados[k] = !this.checksMarcados[k]; },
                isModuloCompleto(mIdx) {
                    const m = this.procCarregado.etapas[this.etapaAtual].modulos[mIdx];
                    return m.checks.every((c, i) => this.checksMarcados[this.etapaAtual+'-'+mIdx+'-'+i]);
                },
                finalizar() { alert("Procedimento concluído com sucesso!"); this.ecra = 'home'; }
            }));
        });
    </script>
</body>
</html>
